# chainview — example configuration
#
# chainview works WITHOUT configuration: copy this only if you want to change
# something. Expected location (XDG):
#   Linux/BSD : ~/.config/chainview/config.toml
#   macOS     : ~/Library/Application Support/chainview/config.toml
#
#   cp config.example.toml ~/.config/chainview/config.toml

# How often, in seconds, balances are refreshed (polling). Default: 15.
refresh_seconds = 15

# Fiat valuation currency for balances. Default: usd.
# (v1 only supports USD; more currencies will come in a later release.)
fiat_currency = "usd"

# Color theme: "auto" (detects the terminal background), "dark" or "light".
# Default: auto. You can switch it at runtime from the app (Ctrl+K → Theme).
theme = "auto"

# Etherscan API key. OPTIONAL: by default transaction history comes from
# Blockscout WITHOUT any key. If you set a key, chainview uses Etherscan instead.
# The ETHERSCAN_API_KEY environment variable takes precedence.
# etherscan_api_key = "YOUR_API_KEY"

# Per-network RPC endpoint overrides. By default the public publicnode.com RPCs
# are used (free, keyless, rate-limited). Point here to your own endpoint
# (Alchemy, Infura, your own node…) for more quota. The key is the network slug.
[rpc]
# ethereum = "https://eth-mainnet.g.alchemy.com/v2/YOUR_KEY"
# arbitrum = "https://arb-mainnet.g.alchemy.com/v2/YOUR_KEY"
# base     = "https://base-mainnet.g.alchemy.com/v2/YOUR_KEY"
# optimism = "https://opt-mainnet.g.alchemy.com/v2/YOUR_KEY"

# Additional or custom networks. Each [[network]] block adds a new EVM network
# (by chain_id) or overrides one from the default catalog. Only the fields you
# set are applied; the rest is inherited from the default network.
#
# Default catalog: Ethereum, Arbitrum One, Base, Optimism, Polygon, Scroll,
# Linea. To add, for example, BNB Chain:
#
# [[network]]
# key            = "bsc"
# name           = "BNB Chain"
# chain_id       = 56
# rpc_url        = "https://bsc-rpc.publicnode.com"
# symbol         = "BNB"
# explorer       = "https://bscscan.com"
# blockscout_api = "https://bsc.blockscout.com/api"   # txs + tokens (optional)
# price_chain    = "bsc"                               # DefiLlama slug for tokens
# native_coin_id = "binancecoin"                       # CoinGecko id of the native coin
#
# To override just the RPC of an existing network the chain_id is enough:
# [[network]]
# chain_id = 137
# rpc_url  = "https://polygon-mainnet.g.alchemy.com/v2/YOUR_KEY"

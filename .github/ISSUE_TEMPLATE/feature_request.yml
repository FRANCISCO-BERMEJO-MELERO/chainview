name: Feature request
description: Suggest an improvement or new functionality
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or need
      description: What would you like to be able to do, and why? Describe the use case.
      placeholder: When I track several wallets, I'd like to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: How you imagine the solution (a shortcut, a view, a config option...).
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false

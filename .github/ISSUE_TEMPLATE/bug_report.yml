name: Bug report
description: Report incorrect behavior in chainview
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Fill in what you can; the more detail, the easier
        it is to reproduce.
  - type: textarea
    id: what-happens
    attributes:
      label: What happens
      description: Describe the problem and what you expected to happen instead.
      placeholder: When I press X, the app...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start chainview with...
        2. Add the wallet...
        3. Press...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `chainview --version`.
      placeholder: chainview v1.0.0 (commit ..., ...)
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: OS and terminal
      placeholder: "Linux / kitty, macOS / iTerm2, Windows / Windows Terminal..."
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Logs, `--debug` output, screenshots or relevant config (no private keys).
    validations:
      required: false

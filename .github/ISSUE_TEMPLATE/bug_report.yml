name: Informe de bug
description: Reporta un comportamiento incorrecto en chainview
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Gracias por reportar. Rellena lo que puedas; cuanta más información, más
        fácil será reproducirlo.
  - type: textarea
    id: que-pasa
    attributes:
      label: Qué ocurre
      description: Describe el problema y qué esperabas que pasara en su lugar.
      placeholder: Al pulsar X, la app...
    validations:
      required: true
  - type: textarea
    id: pasos
    attributes:
      label: Pasos para reproducir
      placeholder: |
        1. Arranco chainview con...
        2. Añado la wallet...
        3. Pulso...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Versión
      description: Salida de `chainview --version`.
      placeholder: chainview v1.0.0 (commit ..., ...)
    validations:
      required: true
  - type: input
    id: entorno
    attributes:
      label: SO y terminal
      placeholder: "Linux / kitty, macOS / iTerm2, Windows / Windows Terminal..."
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Contexto adicional
      description: Logs, salida de `--debug`, capturas o config relevante (sin claves privadas).
    validations:
      required: false
